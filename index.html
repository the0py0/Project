<!DOCTYPE html>
<html>

<head>
  <title>쓰레기통 지도 (수학 공식 연동형)</title>
  <link rel="icon" href="https://i.ibb.co/ZzS1pLr0/logo.png?v=1" type="image/png">

  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
    integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin="" />
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
    integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>

  <style>
    #map {
      width: 100vw;
      height: 100vh;
      margin: 0;
      position: relative;
    }

    body {
      margin: 0;
    }

    .active-btn {
      background-color: #4CAF50 !important;
      color: white !important;
      border-color: #4CAF50 !important;
    }

    .district-btn-active {
      background-color: #008CBA !important;
      color: white !important;
      border-color: #008CBA !important;
    }

    .original-btn-active {
      background-color: #9b59b6 !important;
      color: white !important;
      border-color: #9b59b6 !important;
    }

    .circle-btn-active {
      background-color: #e74c3c !important;
      color: white !important;
      border-color: #e74c3c !important;
    }

    .custom-distance-label {
      background: rgba(0, 0, 0, 0.75);
      color: white;
      border: none;
      box-shadow: none;
      font-weight: bold;
      padding: 4px 8px;
      border-radius: 4px;
      font-size: 12px;
    }

    .custom-distance-label::before {
      display: none;
    }

    .distance-setting-box {
      position: absolute;
      top: 10px;
      right: 20px;
      z-index: 1000;
      background: white;
      padding: 12px;
      border-radius: 8px;
      box-shadow: 0 4px 15px rgba(0, 0, 0, 0.3);
      border: 2px solid #9b59b6;
      font-family: sans-serif;
      width: 210px;
    }

    .distance-setting-box h4 {
      margin: 0 0 8px 0;
      color: #2c3e50;
      font-size: 13px;
      border-bottom: 1px solid #ddd;
      padding-bottom: 5px;
    }

    .setting-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-size: 12px;
    }

    .setting-row input {
      width: 80px;
      padding: 3px;
      border: 1px solid #bdc3c7;
      border-radius: 4px;
      text-align: right;
    }

    .math-popup {
      font-family: 'Courier New', Courier, monospace;
      font-size: 13px;
      line-height: 1.5;
    }

    .math-title {
      font-family: sans-serif;
      font-weight: bold;
      color: #e67e22;
      margin-bottom: 5px;
      font-size: 14px;
    }

    .math-formula {
      background: #f1f2f6;
      padding: 6px;
      border-radius: 4px;
      font-weight: bold;
      color: #2980b9;
      margin: 5px 0;
    }
  </style>
</head>

<body>

  <div id="map">
    <button id="toggleBtn" onclick="toggleMode()" style="position: absolute; top: 10px; left: 55px; z-index: 1000; padding: 10px 20px; font-weight: bold; background: #FFFFFF; color: black; border: 2px solid gray; border-radius: 5px; box-shadow: 0 4px 15px rgba(0, 0, 0, 0.3); cursor: pointer;">
      쓰레기통 위치 설정
    </button>

    <button id="districtBtn" onclick="toggleDistrict()" style="position: absolute; top: 70px; left: 55px; z-index: 1000; padding: 10px 20px; font-weight: bold; background: #FFFFFF; color: black; border: 2px solid gray; border-radius: 5px; box-shadow: 0 4px 15px rgba(0, 0, 0, 0.3); cursor: pointer;">
      행정구역 표시
    </button>

    <button id="originalTrashBtn" onclick="toggleOriginalTrash()" style="position: absolute; top: 130px; left: 55px; z-index: 1000; padding: 10px 15px; font-weight: bold; background: #FFFFFF; color: black; border: 2px solid gray; border-radius: 5px; box-shadow: 0 4px 15px rgba(0, 0, 0, 0.3); cursor: pointer;">
      기존 쓰레기통 위치 (+반경)
    </button>

    <button id="circleBtn" onclick="toggleCircleMode()" style="position: absolute; top: 190px; left: 55px; z-index: 1000; padding: 10px 15px; font-weight: bold; background: #FFFFFF; color: black; border: 2px solid gray; border-radius: 5px; box-shadow: 0 4px 15px rgba(0, 0, 0, 0.3); cursor: pointer;">
      반경 원 그리기
    </button>

    <div class="distance-setting-box" id="settingBox">
      <h4>기존 쓰레기통 기준 거리 설정</h4>
      <div class="setting-row">
        <span>설정 거리 d :</span>
        <div>
          <input type="number" id="formulaD" value="100"> 미터(m)
        </div>
      </div>
    </div>

    <img src="https://i.postimg.cc/yx8d995g/logo.png" alt="공식 로고" style="position: absolute; top: 25px; left: 50%; transform: translateX(-50%); z-index: 1000; width: 150px; height: auto; filter: drop-shadow(0px 4px 8px rgba(0,0,0,0.25)); border-radius: 15px;">
  </div>

  <script>
    // 지도 초기화 (쌍문역 부근)
    var map = L.map('map').setView([37.654732, 127.026566], 14);
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

    // 상태 관리 변수
    var isSettingMode = false;
    var isDistrictMode = false;
    var isCircleMode = false;
    var isOriginalTrashMode = false;

    // 레이어 및 마커 관리 배열
    var markersArray = [];
    var ssamunPolygons = [];
    var circlesArray = [];
    var mathLinesArray = [];
    var originalMarkersArray = [];
    var originalCirclesArray = [];

    // 원 그리기 관련 임시 변수
    var circleCenter = null;
    var currentCircle = null;
    var currentLine = null;
    var distanceTooltip = null;

    // GeoJSON 데이터 (쌍문 1~4동)
    var ssangmunGeoData = {
      "type": "FeatureCollection",
      "features": [
        {
          "type": "Feature",
          "properties": { "adm_nm": "서울특별시 도봉구 쌍문1동" },
          "geometry": {
            "type": "Polygon",
            "coordinates": [[
              [127.016929, 37.6622982], [127.0175004, 37.6615675], [127.0170378, 37.6609543], [127.01723, 37.6600755], [127.0189504, 37.658989], [127.0180589, 37.6584003], [127.0182697, 37.6580778], [127.0188355, 37.6579288], [127.018762, 37.6572339], [127.0197128, 37.6562927], [127.0197128, 37.6562927], [127.0198769, 37.6555704], [127.0204971, 37.6548403], [127.0205086, 37.6542447], [127.0206893, 37.6540536], [127.0212737, 37.6541778], [127.0216334, 37.6543792], [127.0220761, 37.6543436], [127.0229346, 37.6544176], [127.0238247, 37.6542748], [127.0249296, 37.6541795], [127.0254686, 37.6541778], [127.0259354, 37.6538807], [127.0271186, 37.6539717], [127.0278055, 37.6534097], [127.0281042, 37.6532764], [127.0282651, 37.6519196], [127.0286523, 37.6508089], [127.0251297, 37.6466149], [127.0247177, 37.6473956], [127.0227805, 37.6477695], [127.0220298, 37.6482787], [127.0212725, 37.6489475], [127.0205177, 37.6490843], [127.0180016, 37.6485713], [127.0157753, 37.6489643], [127.0147876, 37.6496036], [127.0137789, 37.6492894], [127.0126354, 37.6519595], [127.0126636, 37.6536039], [127.0135505, 37.6573877], [127.0139459, 37.6593283], [127.0143699, 37.6602362], [127.0146703, 37.661922], [127.0153216, 37.6615436], [127.0162544, 37.6614004], [127.0169225, 37.6622909]
            ]]
          }
        },
        {
          "type": "Feature",
          "properties": { "adm_nm": "서울특별시 도봉구 쌍문2동" },
          "geometry": {
            "type": "Polygon",
            "coordinates": [[
              [127.0343581, 37.6566986], [127.0345844, 37.6552335], [127.0343682, 37.6549197], [127.0342255, 37.6539748], [127.0338232, 37.6538464], [127.0329461, 37.6525534], [127.03344, 37.6521975], [127.0332403, 37.6517506], [127.0332898, 37.651141], [127.0363789, 37.6513957], [127.0420366, 37.6607894], [127.0423098, 37.661791], [127.0410342, 37.6616943], [127.0377776, 37.6616836], [127.0374192, 37.6616716], [127.0370836, 37.6611339], [127.03632, 37.6609951], [127.035644, 37.6605789], [127.0349554, 37.6603708], [127.033537, 37.660272], [127.0341062, 37.6598034], [127.0342508, 37.6581142], [127.0328839, 37.6579956], [127.0330524, 37.656402], [127.0343444, 37.6566985], [127.0366007, 37.6572989]
            ]]
          }
        },
        {
          "type": "Feature",
          "properties": { "adm_nm": "서울특별시 도봉구 쌍문3동" },
          "geometry": {
            "type": "Polygon",
            "coordinates": [[
              [127.028638, 37.6507493], [127.0252128, 37.6466425], [127.0259139, 37.6457122], [127.0276027, 37.6449588], [127.0308138, 37.6428871], [127.0317414, 37.643697], [127.036393, 37.6514217], [127.0286626, 37.6507437]
            ]]
          }
        },
        {
          "type": "Feature",
          "properties": { "adm_nm": "서울특별시 도봉구 쌍문4동" },
          "geometry": {
            "type": "Polygon",
            "coordinates": [[
              [127.0258377, 37.6567314], [127.0257807, 37.6558968], [127.025476, 37.6555736], [127.0253002, 37.6542728], [127.0258416, 37.6539344], [127.0266678, 37.6540247], [127.0273659, 37.6539457], [127.0279215, 37.6533592], [127.0282732, 37.6521258], [127.0286965, 37.6507924], [127.0332743, 37.6511572], [127.0332327, 37.6517335], [127.0333886, 37.6521533], [127.0330246, 37.6524497], [127.0329311, 37.6526802], [127.0334411, 37.6534002], [127.0338506, 37.6540258], [127.0340378, 37.6539765], [127.0342665, 37.6548162], [127.0342259, 37.6551297], [127.0344755, 37.6552449], [127.0345587, 37.6555907], [127.0343602, 37.6567398], [127.0341257, 37.6567274], [127.0330472, 37.656418], [127.0329221, 37.6580515], [127.034338, 37.6581528], [127.0341521, 37.6598399], [127.0338082, 37.6599884], [127.0335894, 37.6602731], [127.0334331, 37.6602731], [127.0321063, 37.6595693], [127.0309105, 37.6595858], [127.0299606, 37.6596761], [127.0292431, 37.6594703], [127.0276201, 37.6586486], [127.0273498, 37.6585334], [127.0274508, 37.6582148], [127.0274716, 37.6578937], [127.0273468, 37.6573751], [127.0270764, 37.657054], [127.0264733, 37.6568153], [127.0262445, 37.6566671], [127.0260054, 37.6568482], [127.025839, 37.6567247]
            ]]
          }
        }
      ]
    };

    // 기존 쓰레기통 좌표 데이터
    var originalTrashData = [
      [37.6512778, 127.0129011], [37.6549873, 127.0130613], [37.6489013, 127.0346038], [37.6576106, 127.014879],
      [37.6572582, 127.0151748], [37.6528267, 127.0171439], [37.6527443, 127.0170854], [37.6501298, 127.0202992],
      [37.6529679, 127.022344], [37.649495, 127.0220523], [37.6483863, 127.0250928], [37.6496921, 127.0276966],
      [37.6484513, 127.0266275], [37.6469075, 127.025375], [37.65578, 127.0278628], [37.6604665, 127.0349653],
      [37.6571619, 127.0384507], [37.6586791, 127.0404578], [37.6569365, 127.0394021], [37.6544823, 127.0379485],
      [37.6554501, 127.0346423], [37.6555141, 127.0352009], [37.6510962, 127.0324107], [37.6511006, 127.0324218],
      [37.6494696, 127.0276288], [37.6510404, 127.033221], [37.6535343, 127.0373483], [37.648533, 127.0344342],
      [37.6475492, 127.0338192], [37.6447405, 127.0285333], [37.6447735, 127.0286169], [37.6564616, 127.0279475],
      [37.65777, 127.0294187], [37.657995, 127.0316489], [37.6580664, 127.0327078], [37.6576562, 127.0279056],
      [37.6567147, 127.0376458], [37.647949, 127.0340912], [37.6547925, 127.0383374], [37.6519456, 127.0365233],
      [37.6488104, 127.0347725]
    ];

    // 기존 쓰레기통 아이콘 설정
    var trashIcon = L.icon({
      iconUrl: 'https://i.postimg.cc/zXz77rB4/BINICON.png',
      iconSize: [35, 35],
      iconAnchor: [17, 35],
      popupAnchor: [0, -35]
    });

    // MODE 1: 쓰레기통 위치 설정 토글
    function toggleMode() {
      isSettingMode = !isSettingMode;
      var btn = document.getElementById('toggleBtn');
      if (isSettingMode) {
        if (isCircleMode) toggleCircleMode();
        btn.innerText = "위치 설정 활성화됨";
        btn.classList.add('active-btn');
      } else {
        btn.innerText = "쓰레기통 위치 설정";
        btn.classList.remove('active-btn');
      }
    }

    // MODE 2: 행정구역 표시 토글
    function toggleDistrict() {
      isDistrictMode = !isDistrictMode;
      var btn = document.getElementById('districtBtn');
      if (isDistrictMode) {
        btn.innerText = "행정구역 숨기기";
        btn.classList.add('district-btn-active');
        showTerritory();
      } else {
        btn.innerText = "행정구역 표시";
        btn.classList.remove('district-btn-active');
        hideTerritory();
      }
    }

    // MODE 3: 반경 원 그리기 토글
    function toggleCircleMode() {
      isCircleMode = !isCircleMode;
      var btn = document.getElementById('circleBtn');
      if (isCircleMode) {
        if (isSettingMode) toggleMode();
        btn.innerText = "원 그리기 활성화됨";
        btn.classList.add('circle-btn-active');
        setCirclesInteractive(false);
      } else {
        btn.innerText = "반경 원 그리기";
        btn.classList.remove('circle-btn-active');
        if (circleCenter) {
          if (currentCircle) map.removeLayer(currentCircle);
          if (currentLine) map.removeLayer(currentLine);
        }
        resetCircleDrawing();
        setCirclesInteractive(true);
      }
    }

    // 이미 그려진 원들의 클릭 이벤트 상호작용 설정
    function setCirclesInteractive(enabled) {
      circlesArray.forEach(function (item) {
        if (item.circle && item.circle._path) {
          if (enabled) item.circle._path.style.pointerEvents = 'auto';
          else item.circle._path.style.pointerEvents = 'none';
        }
      });
    }

    // 원 그리기 상태 초기화
    function resetCircleDrawing() {
      circleCenter = null;
      currentCircle = null;
      currentLine = null;
      distanceTooltip = null;
    }

    // 행정구역(동별) 지도 레이어 생성
    function showTerritory() {
      if (ssamunPolygons.length > 0) return;
      var layer = L.geoJSON(ssangmunGeoData, {
        style: function (feature) {
          var name = feature.properties.adm_nm || "";
          var color = '#ff4757';
          if (name.includes('쌍문1동')) color = '#ff4757';
          else if (name.includes('쌍문2동')) color = '#2ed573';
          else if (name.includes('쌍문3동')) color = '#1e90ff';
          else if (name.includes('쌍문4동')) color = '#ffa502';
          return { color: color, weight: 3, opacity: 0.7, fillColor: color, fillOpacity: 0.25 };
        },
        interactive: false
      }).addTo(map);
      ssamunPolygons.push(layer);
    }

    // 행정구역 레이어 삭제
    function hideTerritory() {
      ssamunPolygons.forEach(function (layer) { map.removeLayer(layer); });
      ssamunPolygons = [];
    }

    // LocalStorage에서 마커 로드
    function loadMarkers() {
      const savedMarkers = localStorage.getItem('trashMarkers');
      if (savedMarkers) {
        const locations = JSON.parse(savedMarkers);
        locations.forEach(function (loc) { createMarker(loc.lat, loc.lng); });
      }
    }

    // LocalStorage에 마커 저장
    function saveMarkers() {
      const locations = markersArray.map(function (m) {
        return { lat: m.getLatLng().lat, lng: m.getLatLng().lng };
      });
      localStorage.setItem('trashMarkers', JSON.stringify(locations));
    }

    // 신규 마커 생성 및 거리 연산 함수
    function createMarker(lat, lng) {
      const markerPosition = L.latLng(lat, lng);
      const newMarker = L.marker(markerPosition).addTo(map);
      var closestTrash = null;
      var minDistance = Infinity;

      // 1. 기존 고정 데이터에서 가장 가까운 쓰레기통 검색
      originalTrashData.forEach(function (coord) {
        var trashLatLng = L.latLng(coord[0], coord[1]);
        var dist = markerPosition.distanceTo(trashLatLng);
        if (dist < minDistance) {
          minDistance = dist;
          closestTrash = trashLatLng;
        }
      });

      // 2. 이미 생성된 커스텀 마커 중에서 가장 가까운 쓰레기통 재검사
      markersArray.forEach(function (m) {
        if (m !== newMarker) {
          var markerLatLng = m.getLatLng();
          var dist = markerPosition.distanceTo(markerLatLng);
          if (dist < minDistance) {
            minDistance = dist;
            closestTrash = markerLatLng;
          }
        }
      });

      var popupMathContent = "";
      if (closestTrash) {
        // 주황색 점선 연결선 지도에 추가
        var mathLine = L.polyline([closestTrash, markerPosition], {
          color: '#e67e22',
          weight: 3,
          dashArray: '6, 6'
        }).addTo(map);

        // 연동 삭제 처리를 위해 객체쌍으로 보관
        mathLinesArray.push({
          marker: newMarker,
          line: mathLine
        });

        var x1 = closestTrash.lng.toFixed(5);
        var y1 = closestTrash.lat.toFixed(5);
        var x2 = markerPosition.lng.toFixed(5);
        var y2 = markerPosition.lat.toFixed(5);
        var dx = (x2 - x1).toFixed(5);
        var dy = (y2 - y1).toFixed(5);
        var finalDist = minDistance.toFixed(1);

        // 팝업 수학 공식 HTML 템플릿
        popupMathContent = `
          <div class="math-popup">
            <div class="math-title">■ 피타고라스 거리 공식 적용</div>
            <div>• 기존/설정 쓰레기통 A: (${x1}, ${y1})</div>
            <div>• 신규 후보지 B: (${x2}, ${y2})</div>
            <div class="math-formula">d = &radic;((x₂ - x₁)&sup2; + (y₂ - y₁)&sup2;)</div>
            <div>&radic;(${dx}&sup2; + ${dy}&sup2;)</div>
            <div style="margin-top:5px; font-weight:bold; color:#e74c3c;">&rarr; 실제 거리 d &asymp; ${finalDist} m</div>
          </div>
          <hr style="border:0; border-top:1px solid #ddd; margin:8px 0;">
        `;
      }

      // 팝업 내 삭제 버튼 생성 및 이벤트 바인딩
      const deleteBtn = document.createElement('button');
      deleteBtn.innerText = '삭제하기';
      deleteBtn.style.cssText = 'margin-top:5px; color:red; cursor:pointer; border:1px solid red; background:white; border-radius:3px; padding: 2px 5px; display:block; width:100%;';
      deleteBtn.onclick = function () {
        map.removeLayer(newMarker);
        
        // 연결된 기하학적 매칭선 동시 삭제
        mathLinesArray = mathLinesArray.filter(function (item) {
          if (item.marker === newMarker) {
            map.removeLayer(item.line);
            return false;
          }
          return true;
        });

        markersArray = markersArray.filter(function (m) { return m !== newMarker; });
        
        // 반경 원 모드 갱신
        if (isOriginalTrashMode) {
          toggleOriginalTrash();
          toggleOriginalTrash();
        }
        saveMarkers();
      };

      const popupContent = document.createElement('div');
      popupContent.innerHTML = popupMathContent + '<b>[새 설정] 쓰레기통 위치</b>';
      popupContent.appendChild(deleteBtn);
      newMarker.bindPopup(popupContent);
      markersArray.push(newMarker);
      newMarker.openPopup();

      // 기존 위치 (+반경) 모드가 켜진 상태인 경우, 새 마커 영역에도 즉시 보라색 반경 원 렌더링
      if (isOriginalTrashMode) {
        var dValue = parseFloat(document.getElementById('formulaD').value);
        if (isNaN(dValue) || dValue <= 0) dValue = 100;

        var coverageCircle = L.circle(markerPosition, {
          color: '#9b59b6',
          fillColor: '#9b59b6',
          fillOpacity: 0.1,
          radius: dValue,
          interactive: false
        }).addTo(map);
        originalCirclesArray.push(coverageCircle);
      }
    }

    // 지도 클릭 이벤트 리스너
    map.on('click', function (e) {
      if (isSettingMode) {
        createMarker(e.latlng.lat, e.latlng.lng);
        saveMarkers();
      } else if (isCircleMode) {
        if (!circleCenter) {
          // 원 그리기 시작점 지정
          circleCenter = e.latlng;
          currentCircle = L.circle(circleCenter, {
            color: '#3388ff',
            fillColor: '#3388ff',
            fillOpacity: 0.2,
            radius: 0,
            interactive: false
          }).addTo(map);

          currentLine = L.polyline([circleCenter, circleCenter], {
            color: '#3388ff',
            weight: 2,
            dashArray: '5, 5'
          }).addTo(map);

          distanceTooltip = L.tooltip({
            permanent: true,
            direction: 'right',
            className: 'custom-distance-label'
          });

          currentCircle.bindTooltip(distanceTooltip).openTooltip();
          distanceTooltip.setLatLng(circleCenter).setContent("0m");
        } else {
          // 원 그리기 종료 및 고정
          var finalCircle = currentCircle;
          var finalLine = currentLine;
          var circleSet = { circle: finalCircle, line: finalLine };
          circlesArray.push(circleSet);

          if (finalCircle._path) finalCircle._path.style.pointerEvents = 'none';

          // 고정된 원을 일반 모드에서 클릭 시 삭제 가능하도록 설정
          finalCircle.on('click', function (event) {
            if (!isCircleMode && !isSettingMode) {
              if (confirm("이 원을 삭제하시겠습니까?")) {
                map.removeLayer(circleSet.circle);
                map.removeLayer(circleSet.line);
                circlesArray = circlesArray.filter(function (item) { return item !== circleSet; });
              }
            }
            L.DomEvent.stopPropagation(event);
          });
          resetCircleDrawing();
        }
      }
    });

    // 지도 위 마우스 이동 이벤트 리스너 (실시간 원 반경 렌더링)
    map.on('mousemove', function (e) {
      if (!isCircleMode || !circleCenter) return;
      var currentLatLng = e.latlng;
      var distance = circleCenter.distanceTo(currentLatLng);
      currentCircle.setRadius(distance);
      currentLine.setLatLngs([circleCenter, currentLatLng]);
      var distanceText = distance >= 1000 ? (distance / 1000).toFixed(2) + " km" : Math.round(distance) + " m";
      distanceTooltip.setLatLng(currentLatLng).setContent(distanceText);
    });

    // MODE 4: 기존 쓰레기통 위치 및 설정 반경 원 토글
    function toggleOriginalTrash() {
      isOriginalTrashMode = !isOriginalTrashMode;
      var btn = document.getElementById('originalTrashBtn');
      if (isOriginalTrashMode) {
        btn.innerText = "기존 위치 숨기기";
        btn.classList.add('original-btn-active');
        
        var dValue = parseFloat(document.getElementById('formulaD').value);
        if (isNaN(dValue) || dValue <= 0) dValue = 100;

        // 기존 고정 쓰레기통 데이터 마커 및 반경 표시
        originalTrashData.forEach(function (coord) {
          var marker = L.marker(coord, { icon: trashIcon }).addTo(map);
          marker.bindPopup("<b>[기존] 쓰레기통 위치</b>");
          originalMarkersArray.push(marker);

          var coverageCircle = L.circle(coord, {
            color: '#9b59b6',
            fillColor: '#9b59b6',
            fillOpacity: 0.1,
            radius: dValue,
            interactive: false
          }).addTo(map);
          originalCirclesArray.push(coverageCircle);
        });

        // 사용자가 추가한 커스텀 마커들에도 반경 표시
        markersArray.forEach(function (m) {
          var coord = m.getLatLng();
          var coverageCircle = L.circle(coord, {
            color: '#9b59b6',
            fillColor: '#9b59b6',
            fillOpacity: 0.1,
            radius: dValue,
            interactive: false
          }).addTo(map);
          originalCirclesArray.push(coverageCircle);
        });
      } else {
        btn.innerText = "기존 쓰레기통 위치";
        btn.classList.remove('original-btn-active');
        
        originalMarkersArray.forEach(function (marker) { map.removeLayer(marker); });
        originalMarkersArray = [];

        originalCirclesArray.forEach(function (circle) { map.removeLayer(circle); });
        originalCirclesArray = [];
      }
    }

    // 지도 클릭 시 HTML UI 컨트롤 박스 내부 영역의 버블링 방지 (이벤트 전파 제어)
    var controls = ['toggleBtn', 'districtBtn', 'circleBtn', 'originalTrashBtn', 'settingBox'];
    controls.forEach(function (id) {
      var el = document.getElementById(id);
      L.DomEvent.on(el, 'click', L.DomEvent.stopPropagation);
      L.DomEvent.on(el, 'mousedown', L.DomEvent.stopPropagation);
    });

    // 앱 실행 시 저장된 데이터 초기 로드
    loadMarkers();
  </script>

</body>
</html>
